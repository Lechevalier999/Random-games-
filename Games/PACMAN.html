      height: 8px;

    }

    }
    .player {
      width: 8px;
      height: 8px;
      background: yellow;
      border-radius: 50%;
      z-index: 10;

// Map drawer
const game = document.getElementById("game");

for (let row = 0; row < mapGrid.length; row++) {
  for (let col = 0; col < mapGrid[row].length; col++) {
    const tile = document.createElement("div");
    tile.classList.add("tile");

    if (mapGrid[row][col] === 1) {
      tile.classList.add("wall");
    } else {
      tile.classList.add("floor");
    }

    game.appendChild(tile);
  }
}
  
// Create Pac-Man
const player = document.createElement("div");
player.classList.add("player");
game.appendChild(player);
  
function updatePlayerPosition() {
  player.style.gridColumn = playerCol + 1;
  player.style.gridRow = playerRow + 1;
}

updatePlayerPosition();


// Player scripts

let playerCol = 14;
let playerRow = 26;
let playerVelocity = 1;
let playerDir = 90;
let gameOn = true;

// syntax‑only fix
function changeDir(key) {
  if (key === "w") {
    playerDir = 180;
  } else if (key === "a") {
    playerDir = -90;
  } else if (key === "s") {
    playerDir = -180;
  } else if (key === "d") {
    playerDir = 90;
  }
}

function move() {
  if (playerDir == 90) playerCol++;
  if (playerDir == -90) playerCol--;
  if (playerDir == 180) playerRow++;
  if (playerDir == -180) playerRow--;
  updatePlayerPosition();
}

// Player movement loop
while (gameOn == true) {

  if (playerDir == 90) {
    let next = mapGrid[playerRow][playerCol + 1];
    if (next != 1) move();
  }

  if (playerDir == -90) {
    let next = mapGrid[playerRow][playerCol - 1];
    if (next != 1) move();
  }

  if (playerDir == 180) {
    let next = mapGrid[playerRow + 1][playerCol];
    if (next != 1) move();
  }

  if (playerDir == -180) {
    let next = mapGrid[playerRow - 1][playerCol];
    if (next != 1) move();
  }

  document.addEventListener("keydown", (event) => {
    changeDir(event.key);
  });
}

// Ghosts
function getPlayerTile() {
  let playerTile = [playerCol, playerRow];
}
