<!DOCTYPE html>
<html>

    #game {
      display: grid;
      grid-template-columns: repeat(28, 8px); /* 28 tiles wide */
      grid-auto-rows: 8px; /* each tile is 8px tall */
    }

    .tile {
      width: 8px;
      height: 8px;
    }

    .wall {
      background-color: #3b2aff; /* Pac-Man wall blue/purple */
    }

    .floor {
      background-color: black;
    }
  </style>
</head>

  // Map drawer
  const game = document.getElementById("game");

  for (let row = 0; row < mapGrid.length; row++) {
    for (let col = 0; col < mapGrid[row].length; col++) {
      const tile = document.createElement("div");
      tile.classList.add("tile");

      if (mapGrid[row][col] === 1) {
        tile.classList.add("wall");
      } else {
        tile.classList.add("floor");
      }

      game.appendChild(tile);
    }
  }

  // Player script
   // initialise variables
    let playerX = 0
    let playerY = 0
    let playerVelocity = 8 // 1 tile per second
    let playerDir = 90 // 90 right, -90 left, 180 up, -180 down.
    

   // functions
   function changeDir() {
    document.addEventListener('keydown', (event) => {
      if (event.key === 'w') {
          playerDir == 180
      }
     });
     document.addEventListener('keydown', (event) => {
       if (event.key === 'a') {
         playerDir == -90
      }                                
     });                 
     document.addEventListener('keydown', (event) => {
       if (event.key === 's') {
         playerDir == -180
      }                                
     });      
      document.addEventListener('keydown', (event) => {
       if (event.key === 'd') {
         playerDir == 90
      }                                
     });  
    }
    function move() {
      if (playerDir === 90) {
         playerX == playerX + 8
      }
      if (playerDir === -90) {
         playerX == playerX - 8
      }
      if (playerDir === 180) {
         playerY == playerY + 8
      }
      if (playerDir === -180) {
         playerY == playerY - 8
      }      
    }
   // player movement loop 
   for (let i = 0; i < 99999999; i++) {
     if (playerDir === 90) {
      if not ((playerX - 28) * 10)  {
        move()
       }       
      }
    }

  
</script>

</html>
