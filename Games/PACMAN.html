  // Map drawer
  
  const game = document.getElementById("game");

  for (let row = 0; row < mapGrid.length; row++) {
    for (let col = 0; col < mapGrid[row].length; col++) {
      const tile = document.createElement("div");
      tile.classList.add("tile");

      if (mapGrid[row][col] === 1) {
        tile.classList.add("wall");
      } else {
        tile.classList.add("floor");
      }

      game.appendChild(tile);
    }
  }

  // Player scripts
  
   // initialise variables
  
    let playerCol = 14
    let playerRow = 26
    let playerVelocity = 1 // 1 tile per second
    let playerDir = 90 // 90 right, -90 left, 180 up, -180 down.
    let gameOn = true

   // functions
  
   function changeDir(key) {
      if key === "w" then {
        playerDir = 180;
      } else {
        if key === "a" then {
          playerDir = -90;
        } else {
          if key === "s" then {
            playerDir = -180;
          } else {
            if key === "d" then {
              playerDir = 90;
            }
          }
        }
      }
    }
  
    function move() {
      if (playerDir == 90) {
         playerCol++
      }
      if (playerDir == -90) {
         playerCol--
      }
      if (playerDir == 180) {
         playerRow++
      }
      if (playerDir == -180) {
         playerRow--
      }      
    }
  
   // player movement loop 
  
   for (gameOn == true) {
     if playerDir = 90 then {
       let next = mapGrid[playerRow][playerCol + 1]
       if not next = 1 then {
        move()
       }
     }
     if playerDir = -90 then {
       let next = mapGrid[playerRow][playerCol - 1]
       if not next = 1 then {
        move()
       }
     }
     if playerDir = 180 then {
       let next = mapGrid[playerRow + 1][playerCol]
       if not next = 1 then {
        move()
       }
     }
     if playerDir = -180 then {
       let next = mapGrid[playerRow - 1][playerCol]
       if not next = 1 then {
        move()
       }
     }
     document.addEventListener('keydown', (event) => {
      changeDir(event.key)
     });
   }
